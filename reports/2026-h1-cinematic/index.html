<!DOCTYPE html>
<html lang="zh-MO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 H1 闪购述职报告 · Street Flight V2</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<main id="stage" aria-label="2026 H1 闪购述职报告">
  <canvas id="scene"></canvas>
  <div id="meteor-layer"></div>
  <div id="blackout"></div>
  <div id="dawn-glow"></div>
  <div id="speed-lines"></div>
  <div id="vignette"></div>
  <div id="grain"></div>
  <div id="sun-layer"><div class="sun-core"></div></div>
  <div id="end-title"><span>从澳门出发，继续向前</span><strong>汇报结束</strong></div>
  <section id="hud">
    <div id="readout">
      <strong id="scene-label">2026 H1 · 闪购述职报告</strong>
      <span id="scene-copy">搜索与加购链路全链路优化</span>
    </div>
    <div id="title">
      <h1><span class="title-year">2026 H1</span><span class="title-name">闪购述职报告</span></h1>
      <p>业绩驱动型 STAR · 从真实澳门出发，讲清搜索与加购链路如何同时拉动 OKR</p>
    </div>
    <div id="report-panel" data-panel-type="intro">
      <div class="panel-inner">
        <span id="panel-kicker">开场 · 业绩快照</span>
        <strong id="panel-title">上半年核心主线：搜索与加购链路</strong>
        <span id="panel-body">Q1 收官 4 项超挑战后，Q2 继续围绕交易、毛利、用户渗透、中腰部商家和体验指标推进。核心答案不是项目数量，而是把搜索到加购的链路打通。</span>
        <div id="panel-metrics" aria-live="polite"></div>
      </div>
    </div>
  </section>
  <div id="progress"><span id="progress-value">0%</span><span id="progress-track"><span id="progress-bar"></span></span></div>
  <nav id="chapter-nav" aria-label="章节导航" data-mode="holding">
    <button id="chapter-prev" class="chapter-button" type="button" aria-label="上一章" title="上一章（← / PageUp）"><span aria-hidden="true">←</span></button>
    <span id="chapter-count" aria-live="polite">开场</span>
    <button id="chapter-next" class="chapter-button" type="button" aria-label="下一章" title="下一章（→ / PageDown / 空格）"><span aria-hidden="true">→</span></button>
    <button id="skip-flight" type="button" title="跳过当前飞行">跳过飞行</button>
    <span id="flight-status" aria-live="polite">停留中</span>
  </nav>
</main>
<div id="scroll-space" aria-hidden="true">
  <span class="scroll-anchor" data-progress="0"></span>
  <span class="scroll-anchor" data-progress="0.205"></span>
  <span class="scroll-anchor" data-progress="0.325"></span>
  <span class="scroll-anchor" data-progress="0.445"></span>
  <span class="scroll-anchor" data-progress="0.57"></span>
  <span class="scroll-anchor" data-progress="0.74"></span>
  <span class="scroll-anchor" data-progress="0.87"></span>
  <span class="scroll-anchor" data-progress="1"></span>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/+esm",
    "three-globe": "https://cdn.jsdelivr.net/npm/three-globe@2.45.2/+esm"
  }
}
</script>
<script type="module" src="./app-loader.js"></script>
</body>
</html>
