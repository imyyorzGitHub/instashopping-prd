name: Deploy cinematic report to GitHub Pages

on:
  push:
    branches:
      - feat/cinematic-street-flight-v2
    paths:
      - "reports/2026-h1-cinematic/**"
      - ".github/workflows/deploy-cinematic-report-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-cinematic-report"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload report artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/2026-h1-cinematic

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
