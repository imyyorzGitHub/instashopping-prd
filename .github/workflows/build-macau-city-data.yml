name: Build Macau OSM city data

on:
  push:
    branches:
      - feat/cinematic-v3-phase2-city
    paths:
      - scripts/fetch_macau_osm.py
      - .github/workflows/build-macau-city-data.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-city-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/cinematic-v3-phase2-city
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch and compact Macau OSM data
        run: python scripts/fetch_macau_osm.py
      - name: Commit generated city data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/2026-h1-cinematic-v3/city-data.json
          git diff --cached --quiet || git commit -m "data: generate compact Macau OSM city dataset"
          git push origin HEAD:feat/cinematic-v3-phase2-city
